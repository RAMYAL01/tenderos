{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-keycloak
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  ports: [{ port: 8080, targetPort: 8080 }]
  selector: { app: {{ .Release.Name }}-keycloak }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-keycloak
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: {{ .Release.Name }}-keycloak }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-keycloak }
    spec:
      {{- include "tenderos.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image }}
          args: ["start", "--hostname-strict=false", "--http-enabled=true", "--proxy-headers=xforwarded"]
          env:
            - { name: KC_DB, value: postgres }
            - { name: KC_DB_URL, value: "jdbc:postgresql://{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.db }}" }
            - { name: KC_DB_USERNAME, value: {{ .Values.postgres.user | quote }} }
            - name: KC_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: PG_PASSWORD } }
            - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: {{ .Values.keycloak.admin | quote }} }
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: KC_ADMIN_PASSWORD } }
          ports: [{ containerPort: 8080 }]
          readinessProbe:
            httpGet: { path: /realms/master, port: 8080 }
            initialDelaySeconds: 40
            periodSeconds: 15
            failureThreshold: 20
{{- end }}
