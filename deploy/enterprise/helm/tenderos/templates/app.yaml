apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-app
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  ports: [{ port: 80, targetPort: 3000 }]
  selector: { app: {{ .Release.Name }}-app }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels: { app: {{ .Release.Name }}-app }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-app }
    spec:
      {{- include "tenderos.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: app
          image: {{ .Values.app.image }}
          ports: [{ containerPort: 3000 }]
          resources: {{- toYaml .Values.app.resources | nindent 12 }}
          env:
            # ── AI: fully local, no egress ──
            - { name: LLM_PROVIDER, value: local }
            - { name: LLM_BASE_URL, value: "http://{{ .Release.Name }}-vllm:8000/v1" }
            - { name: LLM_MODEL, value: {{ .Values.vllm.servedName | quote }} }
            - { name: EMBEDDING_PROVIDER, value: ollama }
            - { name: OLLAMA_HOST, value: "http://{{ .Release.Name }}-ollama:11434" }
            - { name: OLLAMA_EMBED_MODEL, value: {{ .Values.ollama.embedModel | quote }} }
            - { name: OLLAMA_EMBED_DIMS, value: "1536" }
            - { name: OCR_PROVIDER, value: local-vision }
            - { name: OCR_VISION_BASE_URL, value: "http://{{ .Release.Name }}-vllm-vl:8000/v1" }
            - { name: OCR_VISION_MODEL, value: {{ .Values.vllmVl.servedName | quote }} }
            # ── Data ──
            - name: PG_PASSWORD
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: PG_PASSWORD } }
            - { name: DATABASE_URL, value: {{ include "tenderos.dbUrl" . | quote }} }
            - { name: DIRECT_URL, value: {{ include "tenderos.dbUrl" . | quote }} }
            # ── Auth (OIDC / Keycloak) ──
            - { name: AUTH_PROVIDER, value: oidc }
            - { name: OIDC_ISSUER, value: {{ .Values.keycloak.issuerUrl | default (printf "http://%s-keycloak:8080/realms/%s" .Release.Name .Values.keycloak.realm) | quote }} }
            - { name: OIDC_CLIENT_ID, value: {{ .Values.keycloak.realm | quote }} }
            - name: OIDC_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: OIDC_CLIENT_SECRET } }
            - name: OIDC_SESSION_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: OIDC_SESSION_SECRET } }
            - { name: OIDC_DEFAULT_ORG, value: "default" }
            # ── Object storage + app ──
            - { name: S3_ENDPOINT, value: "http://{{ .Release.Name }}-minio:9000" }
            - { name: AWS_S3_BUCKET_NAME, value: {{ .Values.minio.bucket | quote }} }
            - { name: NEXT_PUBLIC_APP_URL, value: {{ .Values.global.appUrl | quote }} }
            - name: INTERNAL_API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: INTERNAL_API_KEY } }
            - name: CRON_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: CRON_SECRET } }
            - name: TRAINING_HMAC_KEY
              valueFrom: { secretKeyRef: { name: {{ .Values.secrets.name }}, key: TRAINING_HMAC_KEY } }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 10
