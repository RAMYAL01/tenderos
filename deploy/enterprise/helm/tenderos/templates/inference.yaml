# Shared model-weights volume (pre-staged offline). Needs RWX storage so both
# vLLM pods can mount it; or schedule both to one GPU node.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-models
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteMany]
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests: { storage: {{ .Values.models.pvc.size }} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  ports: [{ port: 8000, targetPort: 8000 }]
  selector: { app: {{ .Release.Name }}-vllm }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vllm
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: {{ .Release.Name }}-vllm }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-vllm }
    spec:
      {{- include "tenderos.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.global.gpuNodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm
          image: {{ .Values.vllm.image }}
          args:
            - --model
            - {{ .Values.vllm.modelPath }}
            - --served-model-name
            - {{ .Values.vllm.servedName }}
            - --max-model-len
            - {{ .Values.vllm.maxModelLen | quote }}
            - --tensor-parallel-size
            - {{ .Values.vllm.tensorParallelSize | quote }}
            - --gpu-memory-utilization
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
          ports: [{ containerPort: 8000 }]
          resources:
            limits:
              {{ .Values.global.gpuResourceKey }}: {{ .Values.vllm.gpu }}
          volumeMounts: [{ name: models, mountPath: /models }]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 40
      volumes:
        - name: models
          persistentVolumeClaim: { claimName: {{ .Release.Name }}-models }
{{- if .Values.vllmVl.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm-vl
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  ports: [{ port: 8000, targetPort: 8000 }]
  selector: { app: {{ .Release.Name }}-vllm-vl }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vllm-vl
  labels: {{- include "tenderos.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: {{ .Release.Name }}-vllm-vl }
  template:
    metadata:
      labels: { app: {{ .Release.Name }}-vllm-vl }
    spec:
      {{- include "tenderos.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.global.gpuNodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm-vl
          image: {{ .Values.vllmVl.image }}
          args:
            - --model
            - {{ .Values.vllmVl.modelPath }}
            - --served-model-name
            - {{ .Values.vllmVl.servedName }}
            - --max-model-len
            - {{ .Values.vllmVl.maxModelLen | quote }}
            - --limit-mm-per-prompt
            - image=1
          ports: [{ containerPort: 8000 }]
          resources:
            limits:
              {{ .Values.global.gpuResourceKey }}: {{ .Values.vllmVl.gpu }}
          volumeMounts: [{ name: models, mountPath: /models }]
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 40
      volumes:
        - name: models
          persistentVolumeClaim: { claimName: {{ .Release.Name }}-models }
{{- end }}
