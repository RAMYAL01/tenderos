name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Dummy values for build/type-check (real values only used at runtime)
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/tenderos_test"
  DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/tenderos_test"
  # Valid-format placeholder (decodes to clerk.example.com$) so `next build`
  # can prerender Clerk-wrapped pages. Real key is injected at runtime/Vercel.
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_Y2xlcmsuZXhhbXBsZS5jb20k"
  CLERK_SECRET_KEY: "sk_test_dummy"
  ANTHROPIC_API_KEY: "sk-ant-dummy"
  OPENAI_API_KEY: "sk-dummy"
  AWS_ACCESS_KEY_ID: "AKIADUMMY"
  AWS_SECRET_ACCESS_KEY: "dummy"
  AWS_REGION: "us-east-1"
  AWS_S3_BUCKET_NAME: "dummy-bucket"
  INTERNAL_API_KEY: "dummy-internal-key"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

jobs:
  # ── Job 1: Lint + Type Check ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

      - name: Deterministic BOQ engine test (BigInt-exact)
        run: npm run test:boq

      - name: Discovery catalog isolation guard (only ingest.ts writes global tables)
        run: npm run test:discovery

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success() && github.ref == 'refs/heads/main'
        with:
          name: build-output
          path: .next/
          retention-days: 1

  # ── Job 3: Prisma Schema Validation ───────────────────────────────────────
  prisma-check:
    name: Prisma Schema Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check Prisma format
        run: npx prisma format --check

  # ── Job 4: Security Audit ─────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm packages
        run: npm audit --audit-level=high
        continue-on-error: true  # Don't block CI for now; fix in dedicated issues

      - name: Check for secrets in code (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
